<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司介绍 - 华进科技</title>
    <link rel="stylesheet" href="assets/css/style-vibe.css">
    <style>
        /* 全屏滚动容器 */
        .fullscreen-page {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scroll-behavior: smooth;
        }
        
        .fullscreen-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* 第1屏：Hero */
        .hero-screen {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }
        
        /* 第2屏：公司介绍 */
        .intro-screen {
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
        }
        
        /* 第3屏：团队 */
        .team-screen {
            background: linear-gradient(180deg, var(--bg-tertiary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
        }
        
        /* 第4屏：发展历程 */
        .history-screen {
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }
        
        .hero-screen .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            animation: gridPulse 8s ease-in-out infinite;
        }
        
        .hero-screen .bg-glow {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 40% at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 70% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: glowShift 12s ease-in-out infinite;
        }
        
        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }
        
        .hero-eyebrow {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }
        
        .hero-title-main {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards;
        }
        
        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 3rem;
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }
        
        /* 第2屏：成立年份 */
        .year-screen {
            background: var(--bg-secondary);
        }
        
        .year-content {
            text-align: center;
        }
        
        .year-number {
            font-size: clamp(8rem, 25vw, 20rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .year-label {
            font-size: 1.5rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            margin-top: 1rem;
        }
        
        /* 第3屏：数据 */
        .stats-screen {
            background: var(--bg-primary);
        }
        
        .stats-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10rem;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: clamp(5rem, 12vw, 10rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            letter-spacing: 0.1em;
        }
        
        /* 第4屏：三大业务 */
        .biz-screen {
            background: var(--bg-secondary);
        }
        
        .biz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            max-width: 1200px;
            padding: 0 4rem;
        }
        
        .biz-item {
            text-align: center;
            padding: 3rem;
        }
        
        .biz-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
        }
        
        .biz-title {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .biz-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        
        /* 第5屏：理念 */
        .philosophy-screen {
            background: var(--bg-primary);
        }
        
        .philosophy-content {
            text-align: center;
            max-width: 800px;
            padding: 0 2rem;
        }
        
        .philosophy-quote {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-white);
            margin-bottom: 2rem;
        }
        
        .philosophy-author {
            font-size: 1rem;
            color: var(--accent-cyan);
            letter-spacing: 0.2em;
        }
        
        /* 第6屏：CTA */
        .cta-screen {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, #000 100%);
        }
        
        .cta-content {
            text-align: center;
        }
        
        .cta-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 2rem;
        }
        
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 3rem;
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }
        
        /* 页码指示器 */
        .page-indicator {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }
        
        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-dot.active {
            background: var(--accent-cyan);
            transform: scale(1.5);
        }
        
        /* 滚动指示器 */
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-light);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--accent-cyan), transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes scrollLine {
            0%, 100% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        @keyframes glowShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .stats-grid {
                flex-direction: column;
                gap: 4rem;
            }
            .biz-grid {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
        }
    </style>
</head>
<body class="fullscreen-page">
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: transparent; transition: all 0.3s ease;">
        <div class="navbar-container">
            <!-- Logo已移除 -->
            <button class="navbar-toggle" id="navbarToggle" aria-label="展开菜单">☰</button>
            <div class="navbar-nav" id="navbarNav">
                <a href="index.html">首页</a>
                <a href="about.html" class="active">公司介绍</a>
                <a href="services.html">核心业务</a>
                <a href="products.html">自研产品</a>
                <a href="compliance.html">合规说明</a>
                <a href="contact.html">联系我们</a>
            </div>
        </div>
    </nav>

    <!-- 页码指示器 -->
    <div class="page-indicator">
        <div class="page-dot active" data-index="0"></div>
        <div class="page-dot" data-index="1"></div>
        <div class="page-dot" data-index="2"></div>
        <div class="page-dot" data-index="3"></div>
        <div class="page-dot" data-index="4"></div>
        <div class="page-dot" data-index="5"></div>
    </div>

    <!-- 第1屏：Hero -->
    <section class="fullscreen-section hero-screen" data-index="0">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="hero-content">
            <div class="hero-eyebrow">About Us</div>
            <h1 class="hero-title-main">华进科技</h1>
            <p class="hero-subtitle">AI与短视频融合赋能</p>
        </div>
        <div class="scroll-indicator">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- 第2屏：成立年份 -->
    <section class="fullscreen-section year-screen" data-index="1">
        <div class="year-content">
            <div class="year-number">2023</div>
            <div class="year-label">成立于 · 河南焦作</div>
        </div>
    </section>

    <!-- 第3屏：核心数据 -->
    <section class="fullscreen-section stats-screen" data-index="2">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number" data-target="150">0</div>
                <div class="stat-label">服务客户</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" data-target="5000">0</div>
                <div class="stat-label">培训人次</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" data-target="98">0</div>
                <div class="stat-label">满意度 %</div>
            </div>
        </div>
    </section>

    <!-- 第4屏：三大业务 -->
    <section class="fullscreen-section biz-screen" data-index="3">
        <div class="biz-grid">
            <div class="biz-item">
                <div class="biz-icon">📈</div>
                <h3 class="biz-title">黄金外汇</h3>
                <p class="biz-desc">Jarvris 4.0 & 小金妹 2.0<br>智能交易系统</p>
            </div>
            <div class="biz-item">
                <div class="biz-icon">📱</div>
                <h3 class="biz-title">新媒体</h3>
                <p class="biz-desc">AI驱动短视频<br>全流程赋能</p>
            </div>
            <div class="biz-item">
                <div class="biz-icon">🤖</div>
                <h3 class="biz-title">AI落地</h3>
                <p class="biz-desc">大模型部署<br>企业智能化转型</p>
            </div>
        </div>
    </section>

    <!-- 第5屏：理念 -->
    <section class="fullscreen-section philosophy-screen" data-index="4">
        <div class="philosophy-content">
            <p class="philosophy-quote">"技术赋能 · 实战落地 · 合规致远"</p>
            <p class="philosophy-author">CORE VALUES</p>
        </div>
    </section>

    <!-- 第6屏：CTA -->
    <section class="fullscreen-section cta-screen" data-index="5">
        <div class="cta-content">
            <h2 class="cta-title">了解更多</h2>
            <a href="services.html" class="cta-btn">探索业务 →</a>
        </div>
        <!-- Footer -->
        <footer class="footer" style="position: absolute; bottom: 0; left: 0; right: 0; background: transparent; border-top: 1px solid rgba(255,255,255,0.1);">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 华进（河南）教育科技有限公司</p>
                </div>
            </div>
        </footer>
    </section>

    <script>
        // 页码指示器
        const sections = document.querySelectorAll('.fullscreen-section');
        const dots = document.querySelectorAll('.page-dot');
        const page = document.querySelector('.fullscreen-page');
        
        page.addEventListener('scroll', () => {
            const scrollPosition = page.scrollTop;
            const windowHeight = window.innerHeight;
            
            sections.forEach((section, index) => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.offsetHeight;
                
                if (scrollPosition >= sectionTop - windowHeight / 2 && 
                    scrollPosition < sectionTop + sectionHeight - windowHeight / 2) {
                    dots.forEach(d => d.classList.remove('active'));
                    dots[index].classList.add('active');
                }
            });
        });
        
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        // 数字计数动画
        const counters = document.querySelectorAll('.stat-number');
        const observerOptions = { threshold: 0.5 };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const counter = entry.target;
                    const target = parseInt(counter.getAttribute('data-target'));
                    const duration = 2000;
                    const step = target / (duration / 16);
                    let current = 0;
                    
                    const timer = setInterval(() => {
                        current += step;
                        if (current >= target) {
                            counter.textContent = target;
                            clearInterval(timer);
                        } else {
                            counter.textContent = Math.floor(current);
                        }
                    }, 16);
                    
                    observer.unobserve(counter);
                }
            });
        }, observerOptions);
        
        counters.forEach(counter => observer.observe(counter));
        
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        page.addEventListener('scroll', () => {
            if (page.scrollTop > 100) {
                navbar.style.background = 'rgba(3, 7, 18, 0.9)';
                navbar.style.backdropFilter = 'blur(20px)';
            } else {
                navbar.style.background = 'transparent';
                navbar.style.backdropFilter = 'none';
            }
        });
    </script>
</body>
</html>
