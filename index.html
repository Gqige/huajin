    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        /* 方案A：极简高端首页样式 */
        .fullscreen-page {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scroll-behavior: smooth;
        }
        
        .fullscreen-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* 第1屏：Hero */
        .hero-screen {
            /* 背景在 style-vibe.css 中定义 */
        }
        
        .hero-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 1;
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, transparent 70%, rgba(3,7,18,0.3) 90%, rgba(3,7,18,0.6) 100%);
            z-index: 1;
        }
        
        .hero-screen .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            animation: gridPulse 8s ease-in-out infinite;
            z-index: 2;
        }
        
        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }
        
        .hero-eyebrow {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }
        
        .hero-title-main {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }
        
        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 3rem;
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
        }
        
        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
        }
        
        .hero-cta:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }
        
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-light);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
            z-index: 10;
        }
        
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--accent-cyan), transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }
        
        /* 第2-4屏：三大业务 - 视频全屏占满 + 文字叠加 */
        .business-screen {
            position: relative;
            padding: 0;
            overflow: hidden;
        }
        
        .fullscreen-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .fullscreen-image-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .business-screen-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(3,7,18,0.85) 0%, rgba(3,7,18,0.4) 50%, rgba(3,7,18,0.2) 100%);
            z-index: 1;
        }
        
        .business-screen.center-overlay .business-screen-overlay {
            background: linear-gradient(180deg, rgba(3,7,18,0.7) 0%, rgba(3,7,18,0.3) 50%, rgba(3,7,18,0.7) 100%);
        }
        
        .business-screen.right-overlay .business-screen-overlay {
            background: linear-gradient(-90deg, rgba(3,7,18,0.85) 0%, rgba(3,7,18,0.4) 50%, rgba(3,7,18,0.2) 100%);
        }
        
        .business-content-overlay {
            position: relative;
            z-index: 10;
            max-width: 600px;
            padding: 0 5rem;
        }
        
        .business-content-overlay.center {
            text-align: center;
            max-width: 800px;
        }
        
        .business-content-overlay.right {
            margin-left: auto;
            text-align: right;
        }
        
        .business-number {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            color: var(--accent-cyan);
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        
        .business-title-large {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        
        .business-desc-large {

            line-height: 1.7;

        }
        
        .business-features-inline {

        }
        
        .business-content-overlay.center .business-features-inline {
            justify-content: center;
        }

            justify-content: flex-end;
        }
        
        .business-feature-tag {

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);

            color: rgba(255,255,255,0.9);
        }
        
        .business-cta {

            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.5rem;

            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: white;
        }
        
        /* 第3屏：视频展示 */

            flex-direction: column;
            padding: 6rem 0;
        }
        
        .video-screen-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            margin-bottom: 4rem;
            text-align: center;
        }

            display: flex;
            gap: 2rem;
            padding: 0 4rem;
            overflow-x: auto;
            width: 100%;
            scrollbar-width: none;
        }
        
        .videos-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .video-item {
            flex-shrink: 0;
            width: 320px;
            height: 570px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .video-item:hover {
            transform: scale(1.05);
        }
        
        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 第5屏：CTA */
        .cta-screen {
            /* 背景在 style-vibe.css 中定义 */
        }
        
        .cta-content {
            text-align: center;
        }
        
        .cta-title {
            font-size: clamp(2rem, 6vw, 5rem);
            font-weight: 800;
            margin-bottom: 2rem;
        }
        
        .cta-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }
        
        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        
        .cta-btn-primary {
            padding: 1.25rem 3rem;
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .cta-btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }
        
        .cta-btn-secondary {
            padding: 1.25rem 3rem;
            background: transparent;
            color: white;
            font-weight: 600;
            border-radius: 100px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .cta-btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
        }
        
        /* 页码指示器 */
        .page-indicator {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }
        
        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .page-dot.active {
            background: var(--accent-cyan);
            transform: scale(1.5);
        }
        
        /* 鼠标跟随光效 */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        
        body:hover .cursor-glow {
            opacity: 1;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scrollLine {
            0%, 100% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .business-grid {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
            .business-item {
                height: auto;
                min-height: 40vh;
            }
            .stats-container {
                flex-direction: column;
                gap: 4rem;
            }
            .hero-video-bg {
                display: none;
            }
        }
    </style>
</head>

    <script>
        // Hero 视频音频控制
        const heroVideo = document.getElementById('heroVideo');
        const fullscreenPage = document.querySelector('.fullscreen-page');
        let isVideoMuted = false;
        
        // 尝试自动播放带声音（可能被浏览器阻止）
        heroVideo.volume = 0.5;
        heroVideo.play().then(() => {
            // 自动播放成功，尝试取消静音
            heroVideo.muted = false;
        }).catch(err => {
            console.log('自动播放被阻止，需要用户交互');
        });
        
        // 监听滚动，离开第一屏时静音
        fullscreenPage.addEventListener('scroll', () => {
            const scrollPosition = fullscreenPage.scrollTop;
            const heroHeight = document.querySelector('.hero-screen').offsetHeight;
            
            if (scrollPosition > heroHeight * 0.5) {
                // 滚动超过 Hero 屏一半，静音
                if (!heroVideo.muted) {
                    heroVideo.muted = true;
                    isVideoMuted = true;
                }
            } else {
                // 回到 Hero 屏，恢复声音
                if (isVideoMuted && scrollPosition < heroHeight * 0.3) {
                    heroVideo.muted = false;
                    isVideoMuted = false;
                }
            }
        });
        
        // 鼠标跟随光效
        const cursorGlow = document.getElementById('cursorGlow');
        let mouseX = 0, mouseY = 0;
        let currentX = 0, currentY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function animateCursor() {
            currentX += (mouseX - currentX) * 0.1;
            currentY += (mouseY - currentY) * 0.1;
            cursorGlow.style.left = currentX + 'px';
            cursorGlow.style.top = currentY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
        
        // 页码指示器
        const sections = document.querySelectorAll('.fullscreen-section');
        const dots = document.querySelectorAll('.page-dot');
        const page = document.querySelector('.fullscreen-page');
        
        page.addEventListener('scroll', () => {
            const scrollPosition = page.scrollTop;
            const windowHeight = window.innerHeight;
            
            sections.forEach((section, index) => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.offsetHeight;
                
                if (scrollPosition >= sectionTop - windowHeight / 2 && 
                    scrollPosition < sectionTop + sectionHeight - windowHeight / 2) {
                    dots.forEach(d => d.classList.remove('active'));
                    dots[index].classList.add('active');
                }
            });
        });
        
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        // 数字计数动画
        const counters = document.querySelectorAll('.stat-number-big');
        const observerOptions = { threshold: 0.5 };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const counter = entry.target;
                    const target = parseInt(counter.getAttribute('data-target'));
                    const duration = 2000;
                    const step = target / (duration / 16);
                    let current = 0;
                    
                    const timer = setInterval(() => {
                        current += step;
                        if (current >= target) {
                            counter.textContent = target;
                            clearInterval(timer);
                        } else {
                            counter.textContent = Math.floor(current);
                        }
                    }, 16);
                    
                    observer.unobserve(counter);
                }
            });
        }, observerOptions);
        
        counters.forEach(counter => observer.observe(counter));
        
        // 页面加载完成后隐藏骨架屏
        window.addEventListener('load', () => {
            const skeletonLoader = document.getElementById('skeletonLoader');
            if (skeletonLoader) {
                setTimeout(() => {
                    skeletonLoader.classList.add('hidden');
                }, 500);
            }
        });
        
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        page.addEventListener('scroll', () => {
            if (page.scrollTop > 100) {
                navbar.style.background = 'rgba(3, 7, 18, 0.9)';
                navbar.style.backdropFilter = 'blur(20px)';
            } else {
                navbar.style.background = 'transparent';
                navbar.style.backdropFilter = 'none';
            }
        });
        
        // 全局磁吸效果
        function initGlobalMagnetic() {
            const magneticElements = document.querySelectorAll('a, button, .nav-link, .cta-btn, .service-card, .about-card');
            
            magneticElements.forEach(el => {
                el.addEventListener('mousemove', (e) => {
                    const rect = el.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    el.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px)`;
                });
                
                el.addEventListener('mouseleave', () => {
                    el.style.transform = 'translate(0, 0)';
                });
            });
        }
        initGlobalMagnetic();
        
        // 视差滚动效果
        function initParallax() {
            const parallaxBg = document.querySelectorAll('.parallax-bg');
            const parallaxMid = document.querySelectorAll('.parallax-mid');
            
            page.addEventListener('scroll', () => {
                const scrollY = page.scrollTop;
                
                parallaxBg.forEach(el => {
                    el.style.transform = `translateY(${scrollY * 0.1}px)`;
                });
                
                parallaxMid.forEach(el => {
                    el.style.transform = `translateY(${scrollY * 0.05}px)`;
                });
            });
        }
        initParallax();
        
        // 图片懒加载
        function initLazyLoading() {
            const lazyImages = document.querySelectorAll('img[data-src]');
            
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.removeAttribute('data-src');
                        img.classList.add('loaded');
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: '50px' });
            
            lazyImages.forEach(img => imageObserver.observe(img));
        }
        initLazyLoading();
    </script>
