<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自研产品 - 华进科技</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style-vibe.css">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .fullscreen-page {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scroll-behavior: smooth;
        }
        
        .fullscreen-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-screen {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }
        
        /* 产品屏渐变背景 */
        .product-screen {
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
        }
        
        .hero-screen .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            animation: gridPulse 8s ease-in-out infinite;
        }
        
        .hero-screen .bg-glow {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 40% at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 70% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: glowShift 12s ease-in-out infinite;
        }
        
        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }
        
        .hero-eyebrow {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }
        
        .hero-title-main {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards;
        }
        
        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }
        
        .product-screen {
            background: var(--bg-secondary);
        }
        
        .product-screen:nth-child(odd) {
            background: var(--bg-primary);
        }
        
        .product-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            max-width: 1400px;
            padding: 0 4rem;
            align-items: center;
        }
        
        .product-visual {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-mockup {
            width: 400px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
        }
        
        .product-text {
            max-width: 500px;
        }
        
        .product-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-cyan);
            font-size: 0.875rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
        }
        
        .product-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .product-desc {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .product-features {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .product-feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            color: var(--text-light);
        }
        
        .product-feature::before {
            content: "✓";
            color: var(--accent-cyan);
        }
        
        .cta-screen {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, #000 100%);
        }
        
        .cta-content {
            text-align: center;
        }
        
        .cta-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 2rem;
        }
        
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 3rem;
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }
        
        .page-indicator {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }
        
        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-dot.active {
            background: var(--accent-cyan);
            transform: scale(1.5);
        }
        
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-light);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--accent-cyan), transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scrollLine {
            0%, 100% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        @keyframes glowShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        
        @media (max-width: 1024px) {
            .product-content {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
            }
            .product-visual {
                order: -1;
            }
            .product-mockup {
                width: 300px;
                height: 225px;
            }
        }
    </style>
</head>
<body class="fullscreen-page">
    <nav class="navbar" id="navbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: transparent; transition: all 0.3s ease;">
        <div class="navbar-container">
            <!-- Logo已移除 -->
            <button class="navbar-toggle" id="navbarToggle" aria-label="展开菜单">☰</button>
            <div class="navbar-nav" id="navbarNav">
                <a href="index.html">首页</a>
                <a href="about.html">公司介绍</a>
                <a href="services.html">核心业务</a>
                <a href="products.html" class="active">自研产品</a>
                <a href="compliance.html">合规说明</a>
                <a href="contact.html">联系我们</a>
            </div>
        </div>
    </nav>

    <div class="page-indicator">
        <div class="page-dot active" data-index="0"></div>
        <div class="page-dot" data-index="1"></div>
        <div class="page-dot" data-index="2"></div>
        <div class="page-dot" data-index="3"></div>
    </div>

    <section class="fullscreen-section hero-screen" data-index="0">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="hero-content">
            <div class="hero-eyebrow">Our Products</div>
            <h1 class="hero-title-main">自研产品</h1>
            <p class="hero-subtitle">技术驱动 · 持续迭代</p>
        </div>
        <div class="scroll-indicator">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <section class="fullscreen-section product-screen" data-index="1">
        <div class="product-content">
            <div class="product-visual">
                <img class="product-mockup" src="assets/images/portraits/icon-jarvris.png" alt="Jarvris">
            </div>
            <div class="product-text">
                <span class="product-tag">交易系统</span>
                <h2 class="product-title">Jarvris 4.0</h2>
                <p class="product-desc">黄金外汇智能分析系统，基于170+因子多维度评估，提供实时交易信号与风险评估。</p>
                <div class="product-features">
                    <div class="product-feature">170+ 分析因子</div>
                    <div class="product-feature">多时间框架分析</div>
                    <div class="product-feature">实时信号推送</div>
                    <div class="product-feature">历史回测验证</div>
                </div>
            </div>
        </div>
    </section>

    <section class="fullscreen-section product-screen" data-index="2">
        <div class="product-content">
            <div class="product-text">
                <span class="product-tag">交易系统</span>
                <h2 class="product-title">小金妹 2.0</h2>
                <p class="product-desc">MT5智能交易EA，支持多品种自动化交易，内置风险管理与仓位控制。</p>
                <div class="product-features">
                    <div class="product-feature">自动化交易执行</div>
                    <div class="product-feature">智能仓位管理</div>
                    <div class="product-feature">多品种支持</div>
                    <div class="product-feature">Swap保护机制</div>
                </div>
            </div>
            <div class="product-visual">
                <video class="product-mockup" autoplay muted loop playsinline style="border-radius: 24px;">
                    <source src="assets/videos/icon-xiaojinmei.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <section class="fullscreen-section cta-screen" data-index="3">
        <div class="cta-content">
            <h2 class="cta-title">了解更多</h2>
            <a href="contact.html" class="cta-btn">联系我们 →</a>
        </div>
        <footer class="footer" style="position: absolute; bottom: 0; left: 0; right: 0; background: transparent; border-top: 1px solid rgba(255,255,255,0.1);">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 华进（河南）教育科技有限公司</p>
                </div>
            </div>
        </footer>
    </section>

    <script>
        const sections = document.querySelectorAll('.fullscreen-section');
        const dots = document.querySelectorAll('.page-dot');
        const page = document.querySelector('.fullscreen-page');
        
        page.addEventListener('scroll', () => {
            const scrollPosition = page.scrollTop;
            const windowHeight = window.innerHeight;
            
            sections.forEach((section, index) => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.offsetHeight;
                
                if (scrollPosition >= sectionTop - windowHeight / 2 && 
                    scrollPosition < sectionTop + sectionHeight - windowHeight / 2) {
                    dots.forEach(d => d.classList.remove('active'));
                    dots[index].classList.add('active');
                }
            });
        });
        
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        const navbar = document.getElementById('navbar');
        page.addEventListener('scroll', () => {
            if (page.scrollTop > 100) {
                navbar.style.background = 'rgba(3, 7, 18, 0.9)';
                navbar.style.backdropFilter = 'blur(20px)';
            } else {
                navbar.style.background = 'transparent';
                navbar.style.backdropFilter = 'none';
            }
        });
    </script>
</body>
</html>
