<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 华进科技</title>
    <link rel="stylesheet" href="assets/css/style-vibe.css">
    <style>
        .fullscreen-page {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scroll-behavior: smooth;
        }
        
        .fullscreen-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-screen {
            background: var(--bg-primary);
        }
        
        .hero-screen .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            animation: gridPulse 8s ease-in-out infinite;
        }
        
        .hero-screen .bg-glow {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 40% at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 70% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: glowShift 12s ease-in-out infinite;
        }
        
        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }
        
        .hero-eyebrow {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }
        
        .hero-title-main {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards;
        }
        
        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }
        
        .contact-screen {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 50%, var(--bg-tertiary) 100%);
        }
        
        .contact-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4rem;
            max-width: 1200px;
            padding: 0 4rem;
        }
        
        .contact-item {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-5px);
        }
        
        .contact-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        
        .contact-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        
        .contact-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-white);
        }
        
        .contact-value a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .contact-value a:hover {
            color: var(--accent-cyan);
        }
        
        .info-screen {
            background: var(--bg-primary);
        }
        
        .info-content {
            text-align: center;
            max-width: 800px;
            padding: 0 4rem;
        }
        
        .info-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 3rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem;
            text-align: left;
        }
        
        .info-item {
            padding: 2rem;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
        }
        
        .info-item-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .info-item-value {
            font-size: 1.25rem;
            color: var(--text-white);
            font-weight: 500;
        }
        
        .cta-screen {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, #000 100%);
        }
        
        .cta-content {
            text-align: center;
        }
        
        .cta-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 1rem;
        }
        
        .cta-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }
        
        .cta-phone {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            color: var(--accent-cyan);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        
        .cta-phone:hover {
            transform: scale(1.05);
            text-shadow: 0 0 40px rgba(6, 182, 212, 0.5);
        }
        
        .page-indicator {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }
        
        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-dot.active {
            background: var(--accent-cyan);
            transform: scale(1.5);
        }
        
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-light);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--accent-cyan), transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scrollLine {
            0%, 100% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        @keyframes glowShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        
        @media (max-width: 1024px) {
            .contact-content {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="fullscreen-page">
    <nav class="navbar" id="navbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: transparent; transition: all 0.3s ease;">
        <div class="navbar-container">
            <!-- Logo已移除 -->
            <button class="navbar-toggle" id="navbarToggle" aria-label="展开菜单">☰</button>
            <div class="navbar-nav" id="navbarNav">
                <a href="index.html">首页</a>
                <a href="about.html">公司介绍</a>
                <a href="services.html">核心业务</a>
                <a href="products.html">自研产品</a>
                <a href="compliance.html">合规说明</a>
                <a href="contact.html" class="active">联系我们</a>
            </div>
        </div>
    </nav>

    <div class="page-indicator">
        <div class="page-dot active" data-index="0"></div>
        <div class="page-dot" data-index="1"></div>
        <div class="page-dot" data-index="2"></div>
        <div class="page-dot" data-index="3"></div>
    </div>

    <section class="fullscreen-section hero-screen" data-index="0">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="hero-content">
            <div class="hero-eyebrow">Contact Us</div>
            <h1 class="hero-title-main">联系我们</h1>
            <p class="hero-subtitle">河南本地 · 一对一服务</p>
        </div>
        <div class="scroll-indicator">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <section class="fullscreen-section contact-screen" data-index="1">
        <div class="contact-content">
            <div class="contact-item">
                <div class="contact-icon">📞</div>
                <div class="contact-label">电话</div>
                <div class="contact-value"><a href="tel:13203919581">13203919581</a></div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">📧</div>
                <div class="contact-label">邮箱</div>
                <div class="contact-value">contact@huajin.tech</div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">📍</div>
                <div class="contact-label">地址</div>
                <div class="contact-value">河南焦作</div>
            </div>
        </div>
    </section>

    <section class="fullscreen-section info-screen" data-index="2">
        <div class="info-content">
            <h2 class="info-title">公司信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-item-label">公司名称</div>
                    <div class="info-item-value">华进（河南）教育科技有限公司</div>
                </div>
                <div class="info-item">
                    <div class="info-item-label">服务时间</div>
                    <div class="info-item-value">工作日 24小时响应</div>
                </div>
                <div class="info-item">
                    <div class="info-item-label">服务模式</div>
                    <div class="info-item-value">河南本地 · 一对一精准对接</div>
                </div>
                <div class="info-item">
                    <div class="info-item-label">业务范围</div>
                    <div class="info-item-value">教育咨询 · 技术服务</div>
                </div>
            </div>
        </div>
    </section>

    <section class="fullscreen-section cta-screen" data-index="3">
        <div class="cta-content">
            <h2 class="cta-title">立即咨询</h2>
            <p class="cta-subtitle">工作日 24小时响应</p>
            <a href="tel:13203919581" class="cta-phone">13203919581</a>
        </div>
        <footer class="footer" style="position: absolute; bottom: 0; left: 0; right: 0; background: transparent; border-top: 1px solid rgba(255,255,255,0.1);">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 华进（河南）教育科技有限公司</p>
                </div>
            </div>
        </footer>
    </section>

    <script>
        const sections = document.querySelectorAll('.fullscreen-section');
        const dots = document.querySelectorAll('.page-dot');
        const page = document.querySelector('.fullscreen-page');
        
        page.addEventListener('scroll', () => {
            const scrollPosition = page.scrollTop;
            const windowHeight = window.innerHeight;
            
            sections.forEach((section, index) => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.offsetHeight;
                
                if (scrollPosition >= sectionTop - windowHeight / 2 && 
                    scrollPosition < sectionTop + sectionHeight - windowHeight / 2) {
                    dots.forEach(d => d.classList.remove('active'));
                    dots[index].classList.add('active');
                }
            });
        });
        
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        const navbar = document.getElementById('navbar');
        page.addEventListener('scroll', () => {
            if (page.scrollTop > 100) {
                navbar.style.background = 'rgba(3, 7, 18, 0.9)';
                navbar.style.backdropFilter = 'blur(20px)';
            } else {
                navbar.style.background = 'transparent';
                navbar.style.backdropFilter = 'none';
            }
        });
    </script>
</body>
</html>
